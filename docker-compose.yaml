x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.10
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 10

    # ---------------------------- Kafka -------------------------------------
    # Uses Docker service name 'kafka' — not localhost
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    KAFKA_TOPIC_BATCH: stock-market-batch
    KAFKA_TOPIC_REALTIME: stock-market-realtime        # was missing
    KAFKA_GROUP_BATCH_ID: stock-market-batch-consumer-group      # was missing
    KAFKA_GROUP_REALTIME_ID: stock-market-realtime-consumer-group  # was missing

    # ---------------------------- AlphaVantage ------------------------------
    ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}

    # ---------------------------- MinIO -----------------------------------
    # MINIO_ENDPOINT: host:port form for the minio Python client
    # MINIO_CONNECTION: full URL for boto3 and Spark (fs.s3a.endpoint)
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    MINIO_BUCKET: stock-market-data
    MINIO_ENDPOINT: minio:9000
    MINIO_CONNECTION: http://minio:9000

    # ---------------------------- Snowflake ----------------------------------
    SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
    SNOWFLAKE_USER: ${SNOWFLAKE_USER}
    SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
    SNOWFLAKE_DATABASE: STOCKMARKETBATCH
    SNOWFLAKE_SCHEMA: PUBLIC
    SNOWFLAKE_WAREHOUSE: COMPUTE_WH
    SNOWFLAKE_TABLE: DAILY_STOCK_METRICS

    # -----------------Pip dependencies installed at container startup ---------
    # yfinance removed — replaced by AlphaVantage (requests)
    # snowflake-connector-python[pandas] — [pandas] extra needed for write_pandas
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      confluent-kafka
      requests
      pandas
      boto3
      snowflake-connector-python[pandas]
      minio
      pyarrow

  volumes:
    - ./src/airflow/dags:/opt/airflow/dags
    - ./src/airflow/logs:/opt/airflow/logs
    - ./src/airflow/plugins:/opt/airflow/plugins
    - ./src/airflow/requirements:/opt/airflow/requirements
    - ./src/airflow/reports:/opt/airflow/reports
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    container_name: zookeeper
    expose:
      - "2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - ./data/zookeeper/data:/var/lib/zookeeper/data
      - ./data/zookeeper/log:/var/lib/zookeeper/log
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - ./data/kafka:/var/lib/kafka/data
    restart: always

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console port
    environment:
      # These drive the MinIO server itself — must match MINIO_ACCESS/SECRET_KEY above
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: always

  # Initialise MinIO bucket on first start
  minio-mc:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy     # wait for MinIO to be ready before creating bucket
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
      /usr/bin/mc mb --ignore-existing myminio/stock-market-data;
      /usr/bin/mc policy set public myminio/stock-market-data;
      exit 0;
      "

  spark-master:
    image: bitnamilegacy/spark:3.4.2-debian-12-r9
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      # MinIO credentials needed by spark_batch_processor / spark_stream_processor
      # which are submitted via "docker exec spark-master spark-submit ..."
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=stock-market-data
      - MINIO_CONNECTION=http://minio:9000
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./src/spark/jobs:/opt/spark/jobs
      - ./data/spark:/opt/spark/data
    restart: always

  spark-worker:
    image: bitnamilegacy/spark:3.4.2-debian-12-r9
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    depends_on:
      - spark-master
    volumes:
      - ./src/spark/jobs:/opt/spark/jobs
      - ./data/spark:/opt/spark/data
    restart: always

  spark-client:
    image: bitnamilegacy/spark:3.4.2-debian-12-r9
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=client
      - SPARK_MASTER_URL=spark://spark-master:7077
      # MinIO credentials needed by spark_batch_processor and spark_stream_processor
      # which read MINIO_* from os.getenv() inside the Spark job
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=stock-market-data
      - MINIO_CONNECTION=http://minio:9000
    volumes:
      - ./src/spark/jobs:/opt/spark/jobs
      - ./src/airflow/dags/scripts:/opt/airflow/dags/scripts
      - ./data:/opt/spark/data
    command: sleep infinity

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - 8081:8080
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}

volumes:
  postgres-db-volume: